<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Test Déployé Girllll;) ✅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            animation: slideIn 1s ease-out;
        }
        
        p {
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        
        .badge {
            display: inline-block;
            background: #10b981;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        .info {
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Site Déployé avec Succès !</h1>
        <p>Bienvenue sur votre site déployé via la Plateforme CI/CD</p>
        <div class="badge">✅ Déploiement Réussi</div>
        <div class="info">
            <p>📅 Déployé le : <span id="date"></span></p>
            <p>⏰ Heure : <span id="time"></span></p>
        </div>
    </div>
    
    <script>
        const now = new Date();
        document.getElementById('date').textContent = now.toLocaleDateString('fr-FR');
        document.getElementById('time').textContent = now.toLocaleTimeString('fr-FR');
    </script>
</body>
</html>
